# Оператор CloudNativePG (платформенный слой, ставится один раз).
#
# Кладётся в apps/ → корневой `root` (app-of-apps, recurse: true) подхватывает сам,
# как team-services.yaml. Руками `helm install` НЕ ставим — источник истины в git.
#
# Версия: чарт 0.29.0 несёт оператор appVersion 1.30.0. CloudNativePG официально
# поддерживает Kubernetes 1.34/1.35/1.36 начиная с оператора 1.30 — на кластере k3s v1.35.2.
# Сверка версий: https://github.com/cloudnative-pg/charts/releases
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.29.0
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # ServerSideApply обязателен: CRD CNPG превышают лимит аннотации
      # last-applied-configuration (256 КБ) → client-side apply падает "Too long".
      - CreateNamespace=true
      - ServerSideApply=true
